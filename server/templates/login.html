<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Meter OCR</title>
  <link rel="stylesheet" href="/static/app.css?v={{ static_version }}">

  <!-- scoped styles ONLY for login -->
  <style>
    body.auth-bg{
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap{ width: 100%; max-width: 440px; }

    .login-card{
      width: 100%;
      border-radius: 16px;
      padding: 22px 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .login-head{
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .login-title{
      margin: 0;
      font-size: 22px;
      letter-spacing: .8px;
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--text);
    }

    .login-sub{
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .login-form{
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .field{
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .field span{
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .input{
      width: 100%;
      height: 44px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      outline: none;
      box-sizing: border-box;
    }

    .input:focus{
      border-color: #8aa07a;
      box-shadow: 0 0 0 3px rgba(120,160,110,.18);
    }

    .btn-row{
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .btn-login{
      height: 44px;
      min-width: 160px;
      padding: 0 22px;
      border-radius: 10px;
      border: 1px solid var(--line);
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      background: linear-gradient(135deg, #dfe5d6, #f7f3e7);
    }

    .toast.error{
      margin-top: 12px;
      margin-bottom: 6px;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .divider{
      margin: 16px 0;
      opacity: .4;
    }

    .demo-creds summary{
      cursor: pointer;
      user-select: none;
      font-weight: 700;
    }

    .demo-box{
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
    }

    .login-foot{
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body class="auth-bg">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-head">
        <div class="logo big"></div>
        <h1 class="login-title">METER OCR</h1>
        <p class="login-sub">Sign in to continue</p>
      </div>

      {% if error %}
        <div class="toast error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="login-form">

        <label class="field">
          <span>Username</span>
          <input class="input" name="username" autocomplete="username" placeholder="admin / coadmin1 / user11" required>
        </label>

        <label class="field">
          <span>Password</span>
          <input class="input" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </label>

        <div class="btn-row">
          <button class="btn primary btn-login" type="submit">Login</button>
        </div>

      </form>

      <div class="divider"></div>

      <details class="demo-creds">
        <summary>Show demo credentials</summary>
        <div class="demo-box">
          <b>Admin</b>: admin / <code>admin123</code><br/>
          <b>Coadmins</b>: coadmin1..coadmin5 / <code>coadmin123</code><br/>
          <b>Users</b>: user11..user58 / <code>user123</code>
        </div>
      </details>

      <div class="login-foot">
        Tip: Upload only JPG / PNG / WEBP for fastest processing.
      </div>

    </div>
  </div>

</body>
</html>
